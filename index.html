<!DOCTYPE html>
<html>
<head>
  <title>Transport Claims Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background-color: #0f172a;
      color: white;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #1e293b;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }
    th {
      background-color: #020617;
    }
.high { color: red; font-weight: bold; background-color: #3f1d1d; }
.medium { color: orange; font-weight: bold; background-color: #3f331d; }
.low { color: lightgreen; font-weight: bold; background-color: #1d3f2a; }
    .medium { color: orange; font-weight: bold; }
    .low { color: lightgreen; font-weight: bold; }
  </style>
</head>
<body>

<h2>AI Transport Expense Verification Dashboard</h2>
<p>Automatically flags fare anomalies and missing claims for review</p>
<div id="summary" style="margin-bottom: 20px;"></div>
<button onclick="filterHighRisk()">Show High Risk Only</button>
<table>
  <tr>
    <th>Employee</th>
    <th>Route</th>
    <th>Claimed</th>
    <th>Expected</th>
    <th>Issue</th>
    <th>Severity</th>
    <th>Action</th>
  </tr>

<tbody id="table-body"></tbody>
</table>
<script>
  const expectedTrips = [
  { employee: "Employee A", route: "Home → Office", expected: 300 },
  { employee: "Employee B", route: "Office → Client", expected: 200 },
  { employee: "Employee C", route: "Home → Office", expected: 300 },
  { employee: "Employee D", route: "Home → Office", expected: 300 },
  { employee: "Employee E", route: "Home → Office", expected: 300 } // 👈 missing entirely
];
const claims = [
  {
    employee: "Employee A",
    route: "Home → Office",
    expectedRoute: "Home → Office",
    claimed: 500,
    expected: 300
  },
  {
    employee: "Employee B",
    route: "Office → Client",
    expectedRoute: "Office → Client",
    claimed: 0,
    expected: 200
  },
  {
    employee: "Employee C",
    route: "Home → Office",
    expectedRoute: "Home → Office",
    claimed: 300,
    expected: 300
  },
  {
    employee: "Employee D",
    route: "Home → Client",
    expectedRoute: "Home → Office", // 👈 mismatch here
    claimed: 150,
    expected: 300
  }
];
let showingHighOnly = false;

function filterHighRisk() {
  const rows = document.querySelectorAll("table tr");
  const button = document.querySelector("button");

  showingHighOnly = !showingHighOnly;

  rows.forEach((row, index) => {
    if (index === 0) return;

    if (showingHighOnly) {
      if (!row.classList.contains("high-row")) {
        row.style.display = "none";
      }
    } else {
      row.style.display = "";
    }
  });

  // 👇 Change button text
  button.textContent = showingHighOnly 
    ? "Show All Claims" 
    : "Show High Risk Only";
}
function analyzeClaim(claim) {
  let issue = "OK";
  let severity = "Low";
  let action = "Approve";

  // Rule 1: Missing claim (expected but nothing claimed)
  if (claim.expected > 0 && claim.claimed === 0) {
    issue = "Missing Claim";
    severity = "High";
    action = "Investigate: trip not claimed";
  }

  // Rule 2: Unexpected trip (claimed but no expected route/fare)
  else if (!claim.expected || claim.expected === 0) {
    issue = "Unexpected Trip";
    severity = "High";
    action = "Reject / Investigate";
  }

  // Rule 3: Overclaim
  else if (claim.claimed > claim.expected) {
    issue = "Overclaim";
    severity = "High";
    action = "Reject";
  }

  // Rule 4: Underclaim
  else if (claim.claimed < claim.expected) {
    issue = "Underclaim";
    severity = "Low";
    action = "Review";
  }

 if (
  claim.route &&
  claim.expectedRoute &&
  claim.route !== claim.expectedRoute
) {
  // If already high, append info instead of overwriting
  if (severity === "High") {
    issue += " + Route Mismatch";
    action += " & Check route";
  } else {
    issue = "Route Mismatch";
    severity = "Medium";
    action = "Review Route";
  }
} 

  return { issue, severity, action };
}
  function findMissingTrips() {
  const missing = [];

  expectedTrips.forEach(expectedTrip => {
    const found = claims.find(claim =>
      claim.employee === expectedTrip.employee &&
      claim.route === expectedTrip.route
    );

    if (!found) {
      missing.push({
        employee: expectedTrip.employee,
        route: expectedTrip.route,
        claimed: 0,
        expected: expectedTrip.expected,
        issue: "Missing Trip",
        severity: "High",
        action: "Investigate: no submission"
      });
    }
  });

  return missing;
}
function renderTable() {
  const tableBody = document.getElementById("table-body");
  tableBody.innerHTML = "";

  const allRows = [];

  // Normal claims
  claims.forEach(claim => {
    const result = analyzeClaim(claim);
    allRows.push({
      ...claim,
      ...result
    });
  });

  // Missing trips
  const missingTrips = findMissingTrips();
  missingTrips.forEach(trip => {
    allRows.push(trip);
  });

  // Render everything
  allRows.forEach(rowData => {
    const rowClass =
      rowData.severity === "High" ? "high-row" :
      rowData.severity === "Medium" ? "medium-row" : "low-row";

    const severityClass = rowData.severity.toLowerCase();

    const row = `
      <tr class="${rowClass}">
        <td>${rowData.employee}</td>
        <td>${rowData.route}</td>
        <td>${rowData.claimed}</td>
        <td>${rowData.expected}</td>
        <td>${rowData.issue}</td>
        <td class="${severityClass}">${rowData.severity}</td>
        <td>${rowData.action}</td>
      </tr>
    `;

    tableBody.innerHTML += row;
  });
}
function updateSummary() {
  let high = 0;
  let medium = 0;
  let low = 0;

  const allData = [];

// Claims
claims.forEach(claim => {
  allData.push(analyzeClaim(claim));
});

// Missing trips
findMissingTrips().forEach(trip => {
  allData.push(trip);
});

allData.forEach(result => {

    if (result.severity === "High") high++;
    else if (result.severity === "Medium") medium++;
    else low++;
  });

  const total = allData.length;
  const highPercent = ((high / total) * 100).toFixed(1);

  document.getElementById("summary").innerHTML = `
    <strong>Total Claims Reviewed:</strong> ${total} |
    <span style="color:red;"><strong>High Risk:</strong> ${high} (${highPercent}%)</span> |
    <span style="color:orange;"><strong>Medium Risk:</strong> ${medium}</span> |
    <span style="color:lightgreen;"><strong>Low Risk:</strong> ${low}</span>
  `;
}
renderTable();
updateSummary();
</script>
</body>
</html>
